# Ethereum 链解析服务配置
# 继承 base.yaml 的共享配置，仅定义链特定字段

chains:
  ethereum:
    enabled: true
    rpc_endpoint: "https://eth.rpc.blxrbdn.com"
    chain_id: "ethereum-mainnet"
    batch_size: 10
    timeout: 120
    retry_count: 3
    start_block: 0

protocols:
  uniswap:
    enabled: true
    chain: "ethereum"
    contract_addresses: []

quoteAssets:
  - name: WETH
    addr: "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"
    rank: 95
  - name: USDT
    addr: "0xdAC17F958D2ee523a2206206994597C13D831ec7"
    rank: 100
  - name: USDC
    addr: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"
    rank: 99
  - name: DAI
    addr: "0x6B175474E89094C44Da98b954EedeAC495271d0F"
    rank: 97

processor:
  batch_size: 5
  max_concurrent: 3
  retry_delay: 10
  max_retries: 5

storage:
  influxdb:
    bucket: "ethereum"
