# Ethereum 链解析服务配置
# 继承 base.yaml 的共享配置，仅定义链特定字段

chains:
  ethereum:
    enabled: true
    #rpc_endpoint: "https://mainnet.infura.io/v3/1cc866709fd14a219050c22a15497bef"
    rpc_endpoint: "https://ethereum-rpc.publicnode.com/d7976886af593e8fbd1628a855655a9730b37ce4581de9376326fc4a63d98953"
    chain_id: "ethereum-mainnet"
    batch_size: 5
    timeout: 120
    retry_count: 3
    start_block: 25398821

protocols:
  uniswap:
    enabled: true
    chain: "ethereum"
    contract_addresses: []

