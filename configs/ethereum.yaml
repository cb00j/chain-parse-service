# Ethereum 链解析服务配置
# 继承 base.yaml 的共享配置，仅定义链特定字段

chains:
  ethereum:
    enabled: true
    #rpc_endpoint: "https://mainnet.infura.io/v3/1cc866709fd14a219050c22a15497bef"
    rpc_endpoint: "https://ethereum-rpc.publicnode.com/d7976886af593e8fbd1628a855655a9730b37ce4581de9376326fc4a63d98953"
    chain_id: "ethereum-mainnet"
    batch_size: 5
    timeout: 120
    retry_count: 3
    start_block: 25428600

protocols:
  uniswap:
    enabled: true
    chain: "ethereum"
    contract_addresses: []

quoteAssets:
#  - name: WETH
#    addr: "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"
#    rank: 95
  - name: USDT
    addr: "0xdAC17F958D2ee523a2206206994597C13D831ec7"
    rank: 100
#  - name: USDC
#    addr: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"
#    rank: 99
#  - name: DAI
#    addr: "0x6B175474E89094C44Da98b954EedeAC495271d0F"
#    rank: 97

processor:
  batch_size: 1
  max_concurrent: 1
  retry_delay: 10
  max_retries: 5

storage:
  influxdb:
    bucket: "ethereum"

# The Graph 预取任务(internal/thegraph)——用 Uniswap 官方 subgraph 预先拉取
# dex_pools / dex_tokens(含 decimals),弥补"只在扫到建池事件时才有 pool
# 记录"和"EVM extractor 不解析 token 元数据"这两个缺口。
# 默认关闭;v2/v3 endpoint 和 api_key 建议走环境变量注入(见 README /
# CP_THEGRAPH_* 系列),不要把真实 key 提交进这个文件。
thegraph:
  enabled: false
  v2_endpoint: ""   # 例: https://gateway.thegraph.com/api/<api_key>/subgraphs/id/<v2-subgraph-id>
  v3_endpoint: ""   # 例: https://gateway.thegraph.com/api/<api_key>/subgraphs/id/<v3-subgraph-id>
  api_key: ""
  sync_interval: 300   # 秒,两次增量同步之间的间隔
  page_size: 1000      # The Graph 单次查询上限即 1000,一般无需改
  initial_since: 0      # 首次运行(无游标时)起始时间戳;0 表示从 subgraph 创世开始拉全量
 