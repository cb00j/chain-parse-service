# BSC 链解析服务配置
# 继承 base.yaml 的共享配置，仅定义链特定字段

chains:
  bsc:
    enabled: true
    rpc_endpoint: "https://bsc.publicnode.com"
    chain_id: "bsc-mainnet"
    batch_size: 10
    timeout: 90
    retry_count: 3
    start_block: 0

protocols:
  pancakeswap:
    enabled: true
    chain: "bsc"
    contract_addresses:
      - "0xcA143Ce32Fe78f1f7019d7d551a6402fC5350c73"
      - "0x0BFbCF9fa4f9C56B0F40a671Ad40E0805A091865"
  fourmeme:
    enabled: true
    chain: "bsc"
    contract_addresses:
      - "0xEC4549caDcE5DA21Df6E6422d448034B5233bFbC"
      - "0x5c952063c7fc8610FFDB798152D69F0B9550762b"

quoteAssets:
  - name: WBNB
    addr: "0xbb4CdB9CBd36B01bD1cBaEBF2De08d9173bc095c"
    rank: 95
  - name: USDT
    addr: "0x55d398326f99059fF775485246999027B3197955"
    rank: 100
  - name: USDC
    addr: "0x8AC76a51cc950d9822D68b83fE1Ad97B32Cd580d"
    rank: 99
  - name: BUSD
    addr: "0xe9e7CEA3DedcA5984780Bafc599bD69ADd087D56"
    rank: 98

processor:
  batch_size: 8
  max_concurrent: 5
  retry_delay: 8
  max_retries: 4

storage:
  influxdb:
    bucket: "bsc"
